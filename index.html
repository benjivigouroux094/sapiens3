<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SAPIENS TEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;display:flex;flex-direction:column;}
#top{background:#071525;color:#f0b429;padding:10px;font-size:14px;font-family:sans-serif;flex-shrink:0;}
#map{flex:1;position:relative;background:#1a3f60;min-height:200px;}
canvas{position:absolute;top:0;left:0;}
#bot{background:#071525;color:#fff;padding:10px;font-size:12px;font-family:sans-serif;flex-shrink:0;}
</style>
</head>
<body>
<div id="top">SAPIENS — Canvas Test</div>
<div id="map"><canvas id="c"></canvas></div>
<div id="bot">Loading...</div>
<script>
var log=document.getElementById('bot');
function msg(t){log.textContent=t;}
msg('Step 1: JS running');
var mw=document.getElementById('map');
var cv=document.getElementById('c');
var ctx=cv.getContext('2d');
msg('Step 2: Got canvas');
function draw(){
  var W=mw.offsetWidth;
  var H=mw.offsetHeight;
  if(!W||!H){msg('Retrying... W='+W+' H='+H);setTimeout(draw,200);return;}
  cv.width=W;cv.height=H;
  ctx.fillStyle='#1a3f60';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='red';ctx.fillRect(20,20,100,80);
  ctx.fillStyle='lime';ctx.beginPath();ctx.arc(W/2,H/2,60,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.font='18px sans-serif';ctx.fillText('WORKS! '+W+'x'+H,20,H-20);
  msg('Done! W='+W+' H='+H);
}
setTimeout(draw,500);
</script>
</body>
</html>
